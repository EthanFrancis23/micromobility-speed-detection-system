<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micromobility Speed Dashboard</title>

    <!-- Bottstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">Speed Detection Dashboard</h1>
            <p class="text-muted mb-0">Viewing stored speed events</p>
        </div>
        <button class="btn btn-primary">Refresh</button>

    </div>

    <!-- Summary Cards -->
     <div class="row g-3 mb-4">

        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h6 class="text-muted">Total Events</h6>
                    <h3>0</h3>
                </div> 
            </div>
        </div>

        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h6 class="text-muted">Violations</h6>
                    <h3>0</h3>
                </div>
            </div>
        </div>

     </div>

     <!-- Filters -->
      <div class="card mb-4">
        <div class="card-body">

            <div class="row g-3">

                <div class="col-md-4">
                    <label class="form-label">Location</label>
                    <input type="text" class="form-control" placeholder="Test B">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Minimum Speed</label>
                    <input type="number" class="form-control" placeholder="15">
                </div>

                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn btn-primary me-2">Apply</button>
                    <button class="btn btn-outline-secondary">Clear</button>
                </div>

            </div>

        </div>
    </div>

    <!-- Event Table -->
     <div class="card">
        <div class="card-body">

            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Timestamps</th>
                        <th>Speed</th>
                        <th>Threshold</th>
                        <th>Location</th>
                        <th>Image</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will go here later -->
                </tbody>
            </table>

        </div>
     </div>
</div>

</body>
</html>
